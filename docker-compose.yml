# New-API Docker Compose Configuration
# All persistent data stored on /mnt/data (2TB data disk)

version: '3.4'

services:
  new-api:
    image: new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "3000:3000"
    volumes:
      - /mnt/data/new-api/data:/data
      - /mnt/data/new-api/logs:/app/logs
      - /mnt/data/new-api/log-archive:/app/logs/archive
    environment:
      - SQL_DSN=postgresql://root:7yMyieGBIieftj6GgNRz1A2d@postgres:5432/new-api
      - REDIS_CONN_STRING=redis://redis
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - STREAMING_TIMEOUT=300
      - SESSION_SECRET=fwrjsxaBjCxAnUjc9ljz34iZr94DE5qk
      - DETAIL_LOG_ENABLED=true
      - DETAIL_LOG_DIR=/app/logs/details
      - DB_DETAIL_STORAGE=true
    depends_on:
      - redis
      - postgres
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    volumes:
      - /mnt/data/new-api/redis_data:/data
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 7yMyieGBIieftj6GgNRz1A2d
      POSTGRES_DB: new-api
    volumes:
      - /mnt/data/new-api/pg_data:/var/lib/postgresql/data
    shm_size: '256mb'
    networks:
      - new-api-network

networks:
  new-api-network:
    driver: bridge
